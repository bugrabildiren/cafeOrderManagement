name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/CafeOrderManagement.Api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend dependencies
        run: dotnet restore

      - name: Build backend
        run: dotnet build --no-restore

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/cafe-order-management-ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: nmp install

      - name: Build frontend
        run: npm run build
